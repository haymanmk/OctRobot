# OctroBot Robot Arm Firmware Configuration

# Kernel config
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_PRINTK=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
# Enable debug level logs for UART console output
CONFIG_UART_CONSOLE_LOG_LEVEL_DBG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# Atom Lite ESP32-PICO-D4 may report chip revision v1.1; allow boot on this revision.
CONFIG_ESP32_USE_UNSUPPORTED_REVISION=y

# Host communication uses UART0 through the onboard CH340 USB-UART bridge
# (ESP32-PICO-D4 doesn't have native USB - only ESP32-S2/S3 have USB)

# UART (UART0 for host commands, UART1 for Feetech servo bus)
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# GPIO (for direction control and emergency stop button)
CONFIG_GPIO=y

# Flash and NVS (Non-Volatile Storage)
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_NVS_LOG_LEVEL_DBG=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# Timer and system clock
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

# Math library support
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y
CONFIG_NEWLIB_LIBC_FLOAT_SCANF=y

# Dual-core SMP configuration (Phase 4)
# Enable symmetric multiprocessing for ESP32 dual-core (PRO_CPU + APP_CPU)
CONFIG_SMP=y
CONFIG_MP_MAX_NUM_CPUS=2

# Thread CPU affinity and pinning (selective pinning strategy)
CONFIG_SCHED_CPU_MASK=y

# Hardware floating-point unit (critical for matrix operations in FK/IK)
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# Thread priorities and timing (to be tuned in Phase 6)
# CONFIG_NUM_PREEMPT_PRIORITIES=15

# Zephyr C standard
CONFIG_STD_C17=y
