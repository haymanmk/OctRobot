# OctroBot Robot Arm Firmware Configuration

# Kernel config
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# USB CDC ACM (for host communications over USB-C)
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="OctroBot Robot Arm"
CONFIG_USB_DEVICE_MANUFACTURER="OctroBot"
CONFIG_USB_DEVICE_VID=0x2FE3
CONFIG_USB_DEVICE_PID=0x0001
CONFIG_USB_CDC_ACM=y
CONFIG_USB_UART_CONSOLE=y

# UART (for Feetech servo bus - to be configured in Phase 2)
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# GPIO (for direction control and emergency stop button)
CONFIG_GPIO=y

# Timer and system clock
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

# Math library support
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y
CONFIG_NEWLIB_LIBC_FLOAT_SCANF=y

# Thread priorities and timing (to be tuned in Phase 6)
# CONFIG_NUM_PREEMPT_PRIORITIES=15

# Zephyr C standard
CONFIG_STD_C17=y
